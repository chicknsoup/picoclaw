name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      changelog: ${{ steps.version.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate and push tag
        id: version
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(git rev-parse --short=8 HEAD)
          BASE_VERSION=$(git describe --tags --match "v*" --exclude "*nightly*" --abbrev=0 2>/dev/null || true)
          if [ -z "$BASE_VERSION" ] || [ "$BASE_VERSION" = "v0.0.0" ]; then
            TAG="v0.0.0-nightly.${DATE}.${SHA}"
          else
            TAG="${BASE_VERSION}-nightly.${DATE}.${SHA}"
          fi
          VERSION=$TAG
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists, reusing existing tag"
          else
            git tag -a "$TAG" -m "Nightly build $VERSION"
          fi
          git push origin "$TAG"
          
          COMPARE_URL="https://github.com/${{ github.repository }}/commits/${TAG}"
          if [ -n "$BASE_VERSION" ] && [ "$BASE_VERSION" != "v0.0.0" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${BASE_VERSION}...${TAG}"
          fi
          echo "changelog=**Full Changelog**: $COMPARE_URL" >> "$GITHUB_OUTPUT"
          
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows Binaries
    needs: create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        goarch: [amd64, arm64]
    env:
      GOOS: windows
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "0"
      VERSION: ${{ needs.create-tag.outputs.version }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.create-tag.outputs.tag }}

      - name: Setup Go from go.mod
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build frontend
        run: |
          cd web/frontend
          pnpm install
          pnpm build:backend

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Windows resources
        run: go-winres make --in web/backend/winres/winres.json --out web/backend/rsrc --product-version=${{ env.VERSION }} --file-version=${{ env.VERSION }}

      - name: Prepare build
        run: |
          go mod tidy
          go generate ./...

      - name: Set ldflags
        id: ldflags
        run: |
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X github.com/sipeed/picoclaw/pkg/config.Version=${{ env.VERSION }}"
          LDFLAGS="$LDFLAGS -X github.com/sipeed/picoclaw/pkg/config.GitCommit=$(git rev-parse --short HEAD)"
          LDFLAGS="$LDFLAGS -X github.com/sipeed/picoclaw/pkg/config.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="$LDFLAGS -X github.com/sipeed/picoclaw/pkg/config.GoVersion=${{ steps.setup-go.outputs.go-version }}"
          echo "flags=$LDFLAGS" >> "$GITHUB_OUTPUT"

      - name: Build picoclaw
        run: go build -tags stdjson -ldflags '${{ steps.ldflags.outputs.flags }}' -o dist/picoclaw.exe ./cmd/picoclaw

      - name: Build picoclaw-launcher
        run: go build -tags stdjson -ldflags '-s -w' -o dist/picoclaw-launcher.exe ./web/backend

      - name: Build picoclaw-launcher-tui
        run: go build -tags stdjson -ldflags '-s -w' -o dist/picoclaw-launcher-tui.exe ./cmd/picoclaw-launcher-tui

      - name: Create archive
        run: |
          ARCH=${{ matrix.goarch }}
          if [ "$ARCH" = "amd64" ]; then
            ARCH_NAME="x86_64"
          else
            ARCH_NAME="$ARCH"
          fi
          ARCHIVE_NAME="picoclaw_Windows_${ARCH_NAME}.zip"
          cd dist
          zip "../${ARCHIVE_NAME}" picoclaw.exe picoclaw-launcher.exe picoclaw-launcher-tui.exe
          cd ..
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE_NAME }}

  update-rolling:
    name: Update Rolling Nightly
    needs: [create-tag, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build
          merge-multiple: true

      - name: Update nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-tag.outputs.tag }}
          TITLE: ${{ needs.create-tag.outputs.version }}
        run: |
          CHANGELOG='${{ needs.create-tag.outputs.changelog }}'
          NOTES=$(cat <<EOF
          Nightly build for **${TITLE}**
          
          This is an automated build and may be unstable. Use with caution.
          
          ${CHANGELOG}
          EOF
          )
          
          # Delete existing nightly release and tag to avoid conflicts
          echo "Deleting existing nightly release and tag..."
          gh release delete nightly --cleanup-tag -y || true
          git push origin :refs/tags/nightly || true
          
          gh release create nightly \
            --title "Nightly Build" \
            --notes "$NOTES" \
            --target "${{ github.sha }}" \
            --prerelease \
            build/*

          echo "Cleaning up old nightly releases (keeping only the most recent)..."
          gh release list --limit 100 --json tagName -q '.[].tagName | select(contains("-nightly."))' | tail -n +2 | while read -r old_tag; do
            if [ -n "$old_tag" ] && [ "$old_tag" != "$TAG" ]; then
              echo "Deleting old nightly release: $old_tag"
              gh release delete "$old_tag" --cleanup-tag -y || true
            fi
          done
